name: CI pipeline*

on:
  push:
    branches: [ master, "release/*", "maintenance/*"]
  pull_request:
    branches: [ master ]
  workflow_call:
    secrets:
      CODECOV_TOKEN:
        required: true
  workflow_dispatch: {}
permissions:
  actions: read
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Build release wheels
        run: uv build
      - name: Upload dist artifacts
        uses: actions/upload-artifact@v7
        with:
          name: certomancer-dist
          path: dist/
  pytest-coverage:
    runs-on: ubuntu-latest
    needs: build
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
        group: ["testing-minimal", "testing"]
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}
      - name: Disable Python problem matchers
        shell: bash
        run: echo "::remove-matcher owner=python::"
      - name: Install Python dependencies
        shell: bash
        run: |
          uv run --group "${{ matrix.group }}" --no-dev --exact pytest \
           --cov=./ --cov-report=xml:python-${{ matrix.group }}-${{ matrix.python-version }}-coverage.xml
      - name: Stash coverage report
        uses: actions/upload-artifact@v7
        with:
          name: coverage-${{ strategy.job-index }}
          path: "*-coverage.xml"
  codecov-upload:
    runs-on: ubuntu-latest
    needs: [pytest-coverage]
    steps:
      # checkout necessary to ensure the uploaded report contains the correct paths
      - uses: actions/checkout@v6
      - name: Retrieve coverage reports
        uses: actions/download-artifact@v8
        with:
          pattern: coverage-*
          path: ./reports/
      - name: Upload all coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          directory: ./reports/
          flags: unittests
          env_vars: OS,PYTHON
          name: codecov-umbrella
      - name: Clean up coverage reports
        uses: GeekyEggo/delete-artifact@v5
        with:
          name: coverage-*